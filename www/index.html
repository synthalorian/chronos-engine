<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chronos Engine</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #0d0d0f; color: #e0e0e0; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }

        /* ── Animated background particles ── */
        #bg-particles {
            position: fixed; inset: 0; z-index: 0;
            background: radial-gradient(ellipse at 30% 40%, #0d1b2a 0%, #0d0d0f 70%);
        }
        #bg-particles::before {
            content: '';
            position: absolute; inset: 0;
            background-image:
                radial-gradient(1px 1px at 10% 20%, rgba(88,166,255,0.3) 0%, transparent 100%),
                radial-gradient(1px 1px at 30% 60%, rgba(88,166,255,0.2) 0%, transparent 100%),
                radial-gradient(1px 1px at 50% 10%, rgba(88,166,255,0.25) 0%, transparent 100%),
                radial-gradient(1px 1px at 70% 80%, rgba(88,166,255,0.2) 0%, transparent 100%),
                radial-gradient(1px 1px at 90% 30%, rgba(88,166,255,0.3) 0%, transparent 100%),
                radial-gradient(2px 2px at 20% 85%, rgba(88,166,255,0.15) 0%, transparent 100%),
                radial-gradient(2px 2px at 80% 15%, rgba(88,166,255,0.15) 0%, transparent 100%);
            animation: particle-drift 8s ease-in-out infinite alternate;
        }
        @keyframes particle-drift {
            0% { transform: translate(0, 0); opacity: 0.6; }
            100% { transform: translate(15px, -10px); opacity: 1; }
        }

        /* ── Glow ring ── */
        #glow-ring {
            position: fixed; top: 50%; left: 50%;
            width: 200px; height: 200px;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            background: radial-gradient(circle, rgba(88,166,255,0.06) 0%, transparent 70%);
            animation: glow-pulse 3s ease-in-out infinite;
            z-index: 1;
            pointer-events: none;
        }
        @keyframes glow-pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
            50% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
        }

        /* ── Loading Screen ── */
        #loading-screen {
            position: fixed; inset: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: transparent; z-index: 10;
            transition: opacity 0.6s ease, transform 0.6s ease;
        }
        #loading-screen.hidden {
            opacity: 0;
            transform: scale(0.95);
            pointer-events: none;
        }

        /* ── Logo / Title ── */
        .logo-icon {
            width: 64px; height: 64px;
            margin-bottom: 20px;
            position: relative;
        }
        .logo-icon .hex {
            width: 64px; height: 64px;
            background: linear-gradient(135deg, #58a6ff, #1f6feb);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            animation: logo-float 2s ease-in-out infinite;
            box-shadow: 0 0 30px rgba(88,166,255,0.3);
        }
        @keyframes logo-float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        .logo-text {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 3px;
            background: linear-gradient(135deg, #58a6ff, #79c0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 4px;
        }
        .logo-sub {
            font-size: 12px;
            color: #666;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 36px;
        }

        /* ── Progress Bar ── */
        .progress-container {
            width: 260px;
            position: relative;
        }
        .progress-track {
            width: 100%; height: 3px;
            background: #222;
            border-radius: 2px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #1f6feb, #58a6ff);
            border-radius: 2px;
            transition: width 0.4s ease;
        }
        .progress-percent {
            position: absolute;
            right: 0; top: -18px;
            font-size: 11px;
            color: #888;
            font-variant-numeric: tabular-nums;
        }

        /* ── Stage messages ── */
        #loading-stage {
            margin-top: 14px;
            font-size: 13px;
            color: #777;
            transition: opacity 0.3s ease;
            min-height: 20px;
            text-align: center;
        }
        #loading-stage .dot {
            display: inline-block;
            animation: dot-bounce 1.4s ease-in-out infinite;
        }
        #loading-stage .dot:nth-child(2) { animation-delay: 0.2s; }
        #loading-stage .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dot-bounce {
            0%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-4px); }
        }

        /* ── Canvas Container ── */
        #canvas-container {
            position: fixed; inset: 0;
            display: flex; align-items: center; justify-content: center;
            z-index: 2;
        }
        #chronos-canvas {
            display: block;
            width: 100%; height: 100%;
        }

        /* ── Error Screen ── */
        #error-screen {
            position: fixed; inset: 0;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(26,10,10,0.95); z-index: 20;
            padding: 32px;
            backdrop-filter: blur(8px);
        }
        #error-screen.visible { display: flex; }
        #error-screen .error-icon {
            width: 48px; height: 48px;
            border: 3px solid #ff4444;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; color: #ff4444;
            margin-bottom: 16px;
        }
        #error-screen h1 { color: #ff6666; font-size: 22px; margin-bottom: 10px; font-weight: 600; }
        #error-screen p { color: #cc8888; font-size: 13px; max-width: 500px; text-align: center; line-height: 1.6; }
        #error-screen .reload-btn {
            margin-top: 24px;
            padding: 10px 28px;
            background: linear-gradient(135deg, #ff4444, #cc3333);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }
        #error-screen .reload-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(255,68,68,0.3);
        }

        /* ── FPS Counter ── */
        .fps-counter {
            position: fixed; top: 10px; left: 10px;
            background: rgba(0,0,0,0.7);
            color: #4af;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 4px;
            z-index: 30;
            pointer-events: none;
            display: none;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(68,170,255,0.15);
        }
        .fps-counter.visible { display: block; }

        /* ── Responsive ── */
        @media (max-width: 600px) {
            .logo-text { font-size: 22px; }
            .progress-container { width: 200px; }
            #glow-ring { width: 140px; height: 140px; }
        }
    </style>
</head>
<body>

    <!-- Background particles -->
    <div id="bg-particles"></div>
    <div id="glow-ring"></div>

    <!-- Loading Screen -->
    <div id="loading-screen">
        <div class="logo-icon"><div class="hex"></div></div>
        <div class="logo-text">CHRONOS</div>
        <div class="logo-sub">Engine</div>

        <div class="progress-container">
            <span class="progress-percent" id="progress-pct">0%</span>
            <div class="progress-track">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
        </div>
        <div id="loading-stage">Initializing<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></div>
    </div>

    <!-- Error Screen -->
    <div id="error-screen">
        <div class="error-icon">!</div>
        <h1>Failed to Start</h1>
        <p id="error-message">An unknown error occurred while loading the engine.</p>
        <button class="reload-btn" onclick="location.reload()">Reload Page</button>
    </div>

    <!-- FPS Counter -->
    <div id="fps-counter" class="fps-counter">-- FPS</div>

    <!-- Canvas Container -->
    <div id="canvas-container">
        <canvas id="chronos-canvas"></canvas>
    </div>

    <!-- WASM Bootstrap -->
    <script type="module">
        import init, { run_chronos_web } from './chronos_engine.js';

        // ── DOM refs ──
        const loadingScreen = document.getElementById('loading-screen');
        const errorScreen = document.getElementById('error-screen');
        const errorMessage = document.getElementById('error-message');
        const canvas = document.getElementById('chronos-canvas');
        const fpsCounter = document.getElementById('fps-counter');
        const progressFill = document.getElementById('progress-fill');
        const progressPct = document.getElementById('progress-pct');
        const loadingStage = document.getElementById('loading-stage');

        // ── Loading stages with progress milestones ──
        const STAGES = [
            { at: 0,  label: 'Initializing' },
            { at: 20, label: 'Loading WASM module' },
            { at: 45, label: 'Setting up renderer' },
            { at: 65, label: 'Building UI' },
            { at: 85, label: 'Starting engine' },
        ];

        function setProgress(pct, stageLabel) {
            progressFill.style.width = `${Math.min(pct, 100)}%`;
            progressPct.textContent = `${Math.round(Math.min(pct, 100))}%`;
            if (stageLabel) {
                loadingStage.textContent = stageLabel;
            }
        }

        // ── Simulate progress while waiting for real events ──
        let simProgress = 0;
        let simTarget = 85;

        function advanceSim() {
            if (simProgress >= simTarget) return;
            // Ease-in-out curve
            const remaining = simTarget - simProgress;
            const step = Math.max(0.3, remaining * 0.04);
            simProgress = Math.min(simTarget, simProgress + step);

            // Find the current stage
            let label = null;
            for (let i = STAGES.length - 1; i >= 0; i--) {
                if (simProgress >= STAGES[i].at) {
                    label = STAGES[i].label;
                    break;
                }
            }
            setProgress(simProgress, label);
            requestAnimationFrame(advanceSim);
        }

        // ── Boot sequence ──
        async function boot() {
            // Start progress simulation (up to 85%)
            advanceSim();

            try {
                // Initialize WASM module
                setProgress(15, 'Loading WASM module');
                await init();

                // WASM panics show in the error screen
                window.addEventListener('chronos-error', (e) => {
                    showError(e.detail?.message || 'Unknown engine error');
                });

                // Advance sim progress to show renderer init
                simTarget = 95;
                setProgress(45, 'Setting up renderer');

                // Pass canvas to WASM and start the engine
                run_chronos_web(canvas.id);

                // Complete progress
                setProgress(100, 'Ready!');
                simTarget = 100;

                // Brief pause at 100% then hide loading screen
                setTimeout(() => {
                    loadingScreen.classList.add('hidden');

                    // Show FPS counter (hold Shift+F to toggle)
                    document.addEventListener('keydown', (e) => {
                        if (e.shiftKey && e.key === 'F') {
                            fpsCounter.classList.toggle('visible');
                        }
                    });

                    // Expose FPS counter update function globally
                    window.updateFps = (fps) => {
                        fpsCounter.textContent = `${Math.round(fps)} FPS`;
                    };
                }, 400);

            } catch (err) {
                console.error('Boot error:', err);
                showError(err.message || String(err));
            }
        }

        function showError(msg) {
            // Snap progress to error state
            setProgress(100, 'Failed');
            progressFill.style.background = 'linear-gradient(90deg, #cc3333, #ff4444)';

            errorMessage.textContent = msg;
            setTimeout(() => {
                errorScreen.classList.add('visible');
                loadingScreen.classList.add('hidden');
            }, 300);
        }

        boot();
    </script>
</body>
</html>
